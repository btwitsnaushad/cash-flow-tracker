<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash-Flow: Salary & Expense Tracker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-white p-6 rounded-xl shadow-md flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Cash-Flow Dashboard</h1>
                <p class="text-sm text-gray-500">Salary & Expense Tracker Module</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="currencyToggleBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                    Toggle Currency (INR / USD)
                </button>
                <button id="downloadReportBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                    Download Report (PDF)
                </button>
            </div>
        </header>

        <div id="thresholdAlert" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-r-xl shadow-sm animate-pulse" role="alert">
            <p class="font-bold">Critical Warning!</p>
            <p>Your Remaining Balance has dropped below 10% of your Total Salary.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-b-4 border-blue-500">
                <p class="text-sm font-medium text-gray-500 uppercase">Total Salary</p>
                <p id="displaySalary" class="text-2xl font-bold text-gray-800 mt-1">0.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-b-4 border-amber-500">
                <p class="text-sm font-medium text-gray-500 uppercase">Total Expenses</p>
                <p id="displayExpenses" class="text-2xl font-bold text-gray-800 mt-1">0.00</p>
            </div>
            <div id="balanceCard" class="bg-white p-6 rounded-xl shadow-md border-b-4 border-green-500">
                <p class="text-sm font-medium text-gray-500 uppercase">Remaining Balance</p>
                <p id="displayBalance" class="text-2xl font-bold text-gray-800 mt-1">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-md h-fit">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Add Transaction</h2>
                <div id="errorState" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-200"></div>

                <form id="cashFlowForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Set Total Salary</label>
                        <input type="number" id="inputSalary" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. 50000">
                    </div>
                    <hr class="border-gray-200 my-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expense Name</label>
                        <input type="text" id="inputExpenseName" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Rent, Groceries">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expense Amount</label>
                        <input type="number" id="inputExpenseAmount" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. 12000">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition shadow-md">
                        Submit & Update
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md lg:col-span-1 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Expense Logs</h2>
                <div class="overflow-y-auto max-h-[350px] flex-grow">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase bg-gray-50">
                                <th class="p-3">Name</th>
                                <th class="p-3 text-right">Amount</th>
                                <th class="p-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                    <div id="emptyStateText" class="text-center text-gray-400 py-8 text-sm hidden">No expenses logged yet.</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center">
                <h2 class="text-lg font-bold text-gray-800 mb-4 self-start">Visual Breakdown</h2>
                <div class="relative w-full max-w-[280px] aspect-square flex items-center justify-center">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
